<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explorer Engine — Playground</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      #app,
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .caption {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        margin: 0;
        padding: 0.35rem 0.6rem;
        border-radius: 0.35rem;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 0.8rem;
        pointer-events: none;
      }
      .ee-perf-overlay {
        position: fixed;
        right: 1rem;
        top: 1rem;
        margin: 0;
        padding: 0.5rem 0.7rem;
        border-radius: 0.35rem;
        background: rgba(0, 0, 0, 0.6);
        color: #7fffa0;
        font:
          0.75rem/1.4 ui-monospace,
          Consolas,
          monospace;
        white-space: pre;
        pointer-events: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
