<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explorer Engine — Playground</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      #app,
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .caption {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        margin: 0;
        padding: 0.35rem 0.6rem;
        border-radius: 0.35rem;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 0.8rem;
        pointer-events: none;
      }
      /* Hotspot overlay (Sprint 2). Marker layer sits over the canvas; only the
         markers themselves capture pointer events. */
      .ee-hotspot-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .ee-hotspot {
        position: absolute;
        top: 0;
        left: 0;
        width: 44px;
        height: 44px;
        display: none;
        padding: 0;
        border-radius: 50%;
        border: 2px solid #fff;
        background: rgba(59, 167, 255, 0.85);
        color: #fff;
        font-size: 0.9rem;
        line-height: 1;
        cursor: pointer;
        pointer-events: auto;
        transition:
          transform 0.08s linear,
          background 0.15s ease,
          opacity 0.15s ease;
      }
      .ee-hotspot:hover,
      .ee-hotspot:focus-visible,
      .ee-hotspot[data-state='hover'] {
        background: #3ba7ff;
        outline: 3px solid #fff;
        outline-offset: 2px;
      }
      .ee-hotspot[data-state='active'] {
        background: #ffd166;
        color: #222;
      }
      .ee-hotspot[data-state='occluded'] {
        opacity: 0.35;
      }
      .ee-hotspot-list {
        position: fixed;
        top: 1rem;
        right: 1rem;
        max-width: 14rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        font-size: 0.8rem;
      }
      .ee-hotspot-list h2 {
        margin: 0 0 0.4rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.75;
      }
      .ee-hotspot-list ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .ee-hotspot-listitem {
        width: 100%;
        text-align: left;
        padding: 0.3rem 0.5rem;
        border: 1px solid transparent;
        border-radius: 0.35rem;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        font: inherit;
        cursor: pointer;
      }
      .ee-hotspot-listitem:hover,
      .ee-hotspot-listitem:focus-visible {
        border-color: #3ba7ff;
        background: rgba(59, 167, 255, 0.25);
      }
      .ee-hotspot-listitem[data-state='active'] {
        border-color: #ffd166;
      }
      @media (prefers-reduced-motion: reduce) {
        .ee-hotspot {
          transition: none;
        }
      }
      /* State toolbar (Sprint 4). */
      .ee-toolbar {
        position: fixed;
        left: 50%;
        bottom: 1rem;
        transform: translateX(-50%);
        display: flex;
        gap: 0.5rem;
        align-items: center;
        padding: 0.4rem 0.5rem;
        border-radius: 0.6rem;
        background: rgba(0, 0, 0, 0.55);
      }
      .ee-toolbar-group {
        display: flex;
        gap: 0.25rem;
      }
      .ee-toolbar-item {
        padding: 0.35rem 0.7rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 0.35rem;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .ee-toolbar-item:hover,
      .ee-toolbar-item:focus-visible {
        border-color: #3ba7ff;
      }
      .ee-toolbar-item[data-active='true'] {
        background: #3ba7ff;
        border-color: #fff;
      }
      .ee-toolbar-reset {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
